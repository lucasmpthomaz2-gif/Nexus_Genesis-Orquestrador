user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096; # Aumentado para suportar mais conexões WebSocket
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log main;

    sendfile        on;
    keepalive_timeout  65;

    # Configuração de Upstream com Sticky Sessions (ip_hash)
    upstream nexus_websocket_backend {
        ip_hash;
        server nexus-node-1:3000;
        server nexus-node-2:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Endpoint para o Socket.IO
        location /socket.io/ {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            proxy_pass http://nexus_websocket_backend;

            # Habilitar suporte a WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts aumentados para conexões persistentes
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Outros endpoints da API
        location / {
            proxy_pass http://nexus_websocket_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
